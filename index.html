<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dragon Hoodie Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
* { box-sizing:border-box; }

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  text-align:center;
  transition:background 0.8s ease, color 0.8s ease;
  overflow:hidden;
}

.container {
  padding:25vh 20px;
  opacity:0;
  transform:translateY(20px);
  animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  to { opacity:1; transform:translateY(0); }
}

/* Day Theme */
.day {
  background:linear-gradient(135deg,#f8f9fa,#e9ecef);
  color:#111;
}

/* Night Theme */
.night {
  background:radial-gradient(circle at top,#1a1a1a,#000);
  color:#fff;
}

/* Golden owner glow */
.owner {
  text-shadow:0 0 20px rgba(255,215,0,0.8);
}

button, a {
  display:inline-block;
  margin-top:25px;
  padding:14px 30px;
  border-radius:12px;
  font-weight:600;
  font-size:16px;
  border:none;
  cursor:pointer;
  text-decoration:none;
  transition:all .3s ease;
}

.day button, .day a {
  background:#111;
  color:#fff;
}

.night button, .night a {
  background:#fff;
  color:#000;
}

button:hover, a:hover {
  transform:scale(1.05);
}

#celestial {
  position:absolute;
  top:30px;
  right:30px;
  font-size:28px;
}

#timer {
  margin-top:10px;
  opacity:0.7;
}
</style>
</head>

<body>

<div id="celestial"></div>

<div class="container">
  <h1 id="title">Authenticating...</h1>
  <p id="status"></p>
  <p id="timer"></p>
  <button id="claimBtn" style="display:none;">Activate My Hoodie</button>
  <a id="lensBtn" style="display:none;">Enter Experience</a>
</div>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyBn-6yjJd7C4PHF43zj-BEL_bqp4s9S5Yc",
  authDomain: "hoodie-lock.firebaseapp.com",
  projectId: "hoodie-lock",
  storageBucket: "hoodie-lock.firebasestorage.app",
  messagingSenderId: "110562874571",
  appId: "1:110562874571:web:87fa63e77cac10924c774e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= CONFIG ================= */

const LOCK_TIMEOUT = 2 * 60 * 1000;

const LENS = {
  bangaloreDay:"https://www.snapchat.com/unlock/BANGALORE_DAY",
  bangaloreNight:"https://www.snapchat.com/unlock/BANGALORE_NIGHT",
  globalDay:"https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=18f417f3c8354a2795e115939c19908c&metadata=01",
  globalNight:"https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=18f417f3c8354a2795e115939c19908c&metadata=01"
};

const BLR_LAT = 12.9716;
const BLR_LON = 77.5946;
const ALLOWED_RADIUS_KM = 50;

/* ================= DAY / NIGHT ================= */

function isDayTime(){
  const h = new Date().getHours();
  return h >= 6 && h < 18;
}

function applyTheme(){
  const celestial = document.getElementById("celestial");
  if(isDayTime()){
    document.body.classList.add("day");
    celestial.innerText = "☀️";
  } else {
    document.body.classList.add("night");
    celestial.innerText = "🌙";
  }
}

/* ================= UTIL ================= */

function distanceKm(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* ================= MAIN ================= */

async function checkAndLock(){

  const hoodieId = new URLSearchParams(window.location.search).get("hoodie");
  if(!hoodieId){
    document.getElementById("title").innerText="Invalid Hoodie";
    return;
  }

  const ref = db.collection("hoodies").doc(hoodieId);
  const snap = await ref.get();
  const now = Date.now();

  if(snap.exists){
    const data = snap.data();
    if(data.inUse && now - data.usedAt < LOCK_TIMEOUT){
      document.body.innerHTML="<h1>Hoodie Currently In Use</h1>";
      return;
    }
  }

  await ref.set({ inUse:true, usedAt:now }, { merge:true });

  startTimer();
  detectLocation(ref);
}

/* ================= LOCATION ================= */

function detectLocation(ref){

  if(!navigator.geolocation){
    startExperience(false, ref);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos=>{
      const dist = distanceKm(
        pos.coords.latitude,
        pos.coords.longitude,
        BLR_LAT,
        BLR_LON
      );
      startExperience(dist <= ALLOWED_RADIUS_KM, ref);
    },
    ()=> startExperience(false, ref),
    { enableHighAccuracy:true }
  );
}

/* ================= EXPERIENCE ================= */

async function startExperience(isBangalore, ref){

  const hoodieId = new URLSearchParams(window.location.search).get("hoodie");
  const snap = await ref.get();

  const titleEl = document.getElementById("title");
  const statusEl = document.getElementById("status");
  const claimBtn = document.getElementById("claimBtn");
  const lensBtn = document.getElementById("lensBtn");

  if(!snap.exists){
    titleEl.innerText="Hoodie Not Registered";
    return;
  }

  const data = snap.data();
  let deviceId = localStorage.getItem("deviceId");

  if(!data.ownerRegistered){

    titleEl.innerText="Unclaimed Hoodie";
    statusEl.innerText="Activate ownership to personalise.";
    claimBtn.style.display="inline-block";

    claimBtn.onclick = async () => {

      claimBtn.disabled = true;
      claimBtn.innerText = "Activating...";

      const newId = crypto.randomUUID();
      localStorage.setItem("deviceId", newId);

      ref.update({
        ownerRegistered:true,
        registeredDevice:newId
      });

      setTimeout(()=>{
        titleEl.innerText="Welcome " + data.name;
        titleEl.classList.add("owner");
        statusEl.innerText="Your Dragon Hoodie recognises its owner.";
        claimBtn.style.display="none";
      }, 400);
    };

  } else if(deviceId && deviceId === data.registeredDevice){

    titleEl.innerText="Welcome " + data.name;
    titleEl.classList.add("owner");
    statusEl.innerText="Your Dragon Hoodie recognises its owner.";

  } else {

    titleEl.innerText="Hoodie Unlocked";
    statusEl.innerText="Experience available.";
  }

  const day = isDayTime();
  let lensURL;

  if(isBangalore){
    lensURL = day ? LENS.bangaloreDay : LENS.bangaloreNight;
  } else {
    lensURL = day ? LENS.globalDay : LENS.globalNight;
  }

  lensBtn.href = lensURL;
  lensBtn.style.display="inline-block";
}

/* ================= TIMER ================= */

function startTimer(){
  let t=120;
  const timer=document.getElementById("timer");
  const interval=setInterval(()=>{
    timer.innerText="Session ends in " + t-- + "s";
    if(t<0) clearInterval(interval);
  },1000);
}

/* ================= AUTO RELEASE ================= */

window.addEventListener("beforeunload", async ()=>{
  const hoodieId=new URLSearchParams(window.location.search).get("hoodie");
  if(!hoodieId) return;
  await db.collection("hoodies").doc(hoodieId)
    .set({ inUse:false }, { merge:true });
});

/* ================= INIT ================= */

applyTheme();
checkAndLock();

</script>
</body>
</html>
