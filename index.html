<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hoodie Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  transition: background-color 0.4s ease, color 0.4s ease;
}

/* DAY MODE */
body.day {
  background-color: white;
  color: black;
}

/* NIGHT MODE */
body.night {
  background-color: black;
  color: white;
}
</style>
</head>

<body>

<h2 id="status">Authenticating hoodie...</h2>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyBn-6yjJd7C4PHF43zj-BEL_bqp4s9S5Yc",
  authDomain: "hoodie-lock.firebaseapp.com",
  projectId: "hoodie-lock",
  storageBucket: "hoodie-lock.firebasestorage.app",
  messagingSenderId: "110562874571",
  appId: "1:110562874571:web:87fa63e77cac10924c774e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= CONFIG ================= */

const LOCK_TIMEOUT = 120000; // 2 minutes

const LENS = {
  bangaloreDay: "https://www.snapchat.com/unlock/BANGALORE_DAY",
  bangaloreNight: "https://www.snapchat.com/unlock/BANGALORE_NIGHT",
  globalDay: "https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=18f417f3c8354a2795e115939c19908c&metadata=01",
  globalNight: "https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=18f417f3c8354a2795e115939c19908c&metadata=01"
};

const BLR_LAT = 12.9716;
const BLR_LON = 77.5946;
const ALLOWED_RADIUS_KM = 50;

/* ================= THEME ================= */

function applyTheme(){
  const hour = new Date().getHours();

  if(hour >= 6 && hour < 18){
    document.body.classList.remove("night");
    document.body.classList.add("day");
  } else {
    document.body.classList.remove("day");
    document.body.classList.add("night");
  }
}

/* ================= HELPERS ================= */

function isDayTime(){
  const h = new Date().getHours();
  return h >= 6 && h < 18;
}

function distanceKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * (2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/* ================= MAIN ================= */

async function start(){

  applyTheme(); // Apply day/night immediately

  const status = document.getElementById("status");
  const hoodieId = new URLSearchParams(window.location.search).get("hoodie");

  if(!hoodieId){
    status.innerText = "Invalid hoodie link.";
    return;
  }

  const ref = db.collection("hoodies").doc(hoodieId);
  const snap = await ref.get();
  const now = Date.now();

  if(snap.exists){
    const data = snap.data();

    // Check lock
    if(data.inUse && now - data.usedAt < LOCK_TIMEOUT){
      status.innerText = "Hoodie already in use.";
      return;
    }
  }

  // Lock hoodie
  await ref.set({
    inUse: true,
    usedAt: now
  }, { merge:true });

  status.innerText = "Checking location...";

  navigator.geolocation.getCurrentPosition(

    function(position){

      const dist = distanceKm(
        position.coords.latitude,
        position.coords.longitude,
        BLR_LAT,
        BLR_LON
      );

      const isBLR = dist <= ALLOWED_RADIUS_KM;
      const isDay = isDayTime();

      let url;

      if(isBLR){
        url = isDay ? LENS.bangaloreDay : LENS.bangaloreNight;
      } else {
        url = isDay ? LENS.globalDay : LENS.globalNight;
      }

      window.location.href = url;
    },

    function(){
      status.innerText = "Location denied. Loading global.";
      const isDay = isDayTime();
      const url = isDay ? LENS.globalDay : LENS.globalNight;
      window.location.href = url;
    },

    { enableHighAccuracy:true }

  );
}

/* Release lock when leaving */
window.addEventListener("beforeunload", async ()=>{
  const hoodieId = new URLSearchParams(window.location.search).get("hoodie");
  if(!hoodieId) return;

  await db.collection("hoodies").doc(hoodieId).set(
    { inUse:false },
    { merge:true }
  );
});

start();

</script>

</body>
</html>
