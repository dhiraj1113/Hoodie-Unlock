<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hoodie Unlocked</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 25vh;
  transition: background 0.5s ease, color 0.5s ease;
}
a {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 24px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: bold;
  border-radius: 8px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>

<h1>🔓 Hoodie Unlocked</h1>
<p id="status">Authenticating hoodie…</p>
<p id="timer"></p>
<a id="lensBtn" style="display:none;" href="#">Open AR Lens</a>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "hoodie-lock.firebaseapp.com",
  projectId: "hoodie-lock",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= CONFIG ================= */

const LOCK_TIMEOUT = 2 * 60 * 1000; // 2 minutes

const LENS = {
  bangaloreDay: "https://www.snapchat.com/unlock/BANGALORE_DAY",
  bangaloreNight: "https://www.snapchat.com/unlock/BANGALORE_NIGHT",
  globalDay: "https://www.snapchat.com/unlock/GLOBAL_DAY",
  globalNight: "https://www.snapchat.com/unlock/GLOBAL_NIGHT"
};

const BLR_LAT = 12.9716;
const BLR_LON = 77.5946;
const ALLOWED_RADIUS_KM = 50;

/* ================= HELPERS ================= */

function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

function isDayTime() {
  const h = new Date().getHours();
  return h >= 6 && h < 18;
}

function applyDayNightTheme() {
  if (isDayTime()) {
    document.body.style.background = "white";
    document.body.style.color = "black";
  } else {
    document.body.style.background = "black";
    document.body.style.color = "white";
  }
}

/* ================= LOCK SYSTEM ================= */

async function checkAndLock() {
  const statusEl = document.getElementById("status");
  const hoodieId = new URLSearchParams(window.location.search).get("hoodie");

  if (!hoodieId) {
    statusEl.innerText = "❌ Invalid hoodie link";
    return;
  }

  const ref = db.collection("hoodies").doc(hoodieId);

  try {
    await db.runTransaction(async (transaction) => {
      const doc = await transaction.get(ref);
      const now = Date.now();

      if (doc.exists) {
        const data = doc.data();
        if (data.inUse && now - data.usedAt < LOCK_TIMEOUT) {
          throw new Error("IN_USE");
        }
      }

      transaction.set(ref, {
        inUse: true,
        usedAt: now
      }, { merge: true });
    });

    statusEl.innerText = "✅ Hoodie authenticated";
    startTimer();
    startExperience();

  } catch (e) {
    document.body.innerHTML = `
      <h1>🚫 Hoodie already in use</h1>
      <p>Please try again in 2 minutes.</p>
    `;
  }
}

/* ================= EXPERIENCE ================= */

function startExperience() {

  applyDayNightTheme();

  if (!navigator.geolocation) {
    unlock(false);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const dist = distanceKm(
        pos.coords.latitude,
        pos.coords.longitude,
        BLR_LAT,
        BLR_LON
      );
      unlock(dist <= ALLOWED_RADIUS_KM);
    },
    () => unlock(false),
    { enableHighAccuracy: true }
  );
}

function unlock(isBangalore) {
  const statusEl = document.getElementById("status");
  const btn = document.getElementById("lensBtn");
  const day = isDayTime();

  let lensURL;

  if (isBangalore) {
    lensURL = day ? LENS.bangaloreDay : LENS.bangaloreNight;
    statusEl.innerText = "📍 Bangalore Exclusive Experience";
  } else {
    lensURL = day ? LENS.globalDay : LENS.globalNight;
    statusEl.innerText = "🌍 Global Experience";
  }

  btn.href = lensURL;
  btn.style.display = "inline-block";
}

/* ================= TIMER ================= */

function startTimer() {
  let t = 120;
  const timer = document.getElementById("timer");

  const interval = setInterval(() => {
    timer.innerText = `⏳ Session ends in ${t--}s`;
    if (t < 0) {
      clearInterval(interval);
      releaseLock();
    }
  }, 1000);
}

/* ================= AUTO RELEASE ================= */

async function releaseLock() {
  const hoodieId = new URLSearchParams(window.location.search).get("hoodie");
  if (!hoodieId) return;

  await db.collection("hoodies").doc(hoodieId).set(
    { inUse: false },
    { merge: true }
  );
}

checkAndLock();

</script>
</body>
</html>
