<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dragon Hoodie</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  text-align:center;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .6s,color .6s;
}

.day{
  background:linear-gradient(120deg,#f4f6fb,#e8edf7);
  color:#111;
}

.night{
  background:linear-gradient(120deg,#0f1118,#1b1f2c);
  color:#fff;
}

.container{padding:20px;width:100%;max-width:400px}

h1{margin-bottom:10px;font-size:26px}
p{opacity:.7;margin-bottom:10px}

.owner{
  text-shadow:0 0 25px rgba(255,215,0,.9);
}

button{
  margin-top:20px;
  padding:16px 30px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

.day button{background:#111;color:#fff;}
.night button{background:#fff;color:#000;}

#timer{opacity:.5;margin-top:10px}
</style>
</head>
<body>

<div class="container">
  <h1 id="title">Loading...</h1>
  <p id="status"></p>
  <p id="timer"></p>
  <button id="mainBtn" style="display:none;"></button>
</div>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig={
apiKey:"AIzaSyBn-6yjJd7C4PHF43zj-BEL_bqp4s9S5Yc",
authDomain:"hoodie-lock.firebaseapp.com",
projectId:"hoodie-lock",
storageBucket:"hoodie-lock.firebasestorage.app",
messagingSenderId:"110562874571",
appId:"1:110562874571:web:87fa63e77cac10924c774e"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* ================= CONFIG ================= */

const LOCK_TIMEOUT = 120000;

const LENS={
bangaloreDay:"https://www.snapchat.com/unlock/BANGALORE_DAY",
bangaloreNight:"https://www.snapchat.com/unlock/BANGALORE_NIGHT",
globalDay:"https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=18f417f3c8354a2795e115939c19908c&metadata=01",
globalNight:"https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=18f417f3c8354a2795e115939c19908c&metadata=01"
};

const BLR_LAT=12.9716;
const BLR_LON=77.5946;
const ALLOWED_RADIUS_KM=50;

/* ================= HELPERS ================= */

function isDay(){
  const h=new Date().getHours();
  return h>=6 && h<18;
}

function applyTheme(){
  document.body.classList.add(isDay() ? "day" : "night");
}

function distanceKm(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

/* ================= MAIN ================= */

async function init(){

applyTheme();

const hoodieId=new URLSearchParams(window.location.search).get("hoodie");
if(!hoodieId){
  document.getElementById("title").innerText="Invalid Hoodie";
  return;
}

const ref=db.collection("hoodies").doc(hoodieId);
let snap=await ref.get();
let data=snap.data()||{};
const now=Date.now();

/* Reset expired lock */
if(data.inUse && data.usedAt && now-data.usedAt>LOCK_TIMEOUT){
  await ref.update({inUse:false});
  data.inUse=false;
}

const title=document.getElementById("title");
const status=document.getElementById("status");
const btn=document.getElementById("mainBtn");
btn.style.display="inline-block";

/* UNCLAIMED */
if(!data.ownerRegistered){

  title.innerText="Unclaimed Hoodie";
  status.innerText="Activate to personalise.";
  btn.innerText="Activate My Hoodie";

  btn.onclick=async()=>{
    btn.disabled=true;
    btn.innerText="Activating...";

    const id=crypto.randomUUID();
    localStorage.setItem("deviceId",id);

    await ref.set({
      ownerRegistered:true,
      registeredDevice:id,
      name:"Owner",
      inUse:false
    },{merge:true});

    title.innerText="Welcome Owner";
    title.classList.add("owner");
    status.innerText="Ready.";
    btn.innerText="Enter Experience";
    btn.disabled=false;
    btn.onclick=()=>enterExperience(ref);
  };

  return;
}

/* OWNER / GUEST */

let device=localStorage.getItem("deviceId");

if(device===data.registeredDevice){
  title.innerText="Welcome "+(data.name||"Owner");
  title.classList.add("owner");
}else{
  title.innerText="Hoodie Unlocked";
}

status.innerText="Experience available.";
btn.innerText="Enter Experience";
btn.onclick=()=>enterExperience(ref);
}

/* ================= ENTER ================= */

async function enterExperience(ref){

console.log("Enter clicked");

navigator.geolocation.getCurrentPosition(

async function(position){

  console.log("Location granted");

  const snap=await ref.get();
  const data=snap.data();
  const now=Date.now();

  if(data.inUse && now-data.usedAt<LOCK_TIMEOUT){
    alert("Hoodie in use. Try again shortly.");
    return;
  }

  await ref.update({
    inUse:true,
    usedAt:now
  });

  const dist=distanceKm(
    position.coords.latitude,
    position.coords.longitude,
    BLR_LAT,
    BLR_LON
  );

  const isBLR=dist<=ALLOWED_RADIUS_KM;
  const day=isDay();

  let url;

  if(isBLR){
    url=day?LENS.bangaloreDay:LENS.bangaloreNight;
  }else{
    url=day?LENS.globalDay:LENS.globalNight;
  }

  window.location.href=url;

},

function(error){
  console.log("Location error:",error);
  alert("Location blocked or unavailable.");
},

{enableHighAccuracy:true}

);
}

init();

</script>
</body>
</html>
