<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dragon Hoodie Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  text-align:center;
  overflow:hidden;
  transition:background 1s ease,color 1s ease;
}

/* DAY / NIGHT */
.day{
  background:linear-gradient(120deg,#f4f6fb,#e8edf7,#f4f6fb);
  background-size:200% 200%;
  animation:move 8s ease infinite;
  color:#111;
}

.night{
  background:linear-gradient(120deg,#0f1118,#1b1f2c,#0f1118);
  background-size:200% 200%;
  animation:move 10s ease infinite;
  color:#fff;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{
  padding:30vh 20px;
}

h1{
  font-size:28px;
  margin-bottom:10px;
}

p{
  opacity:.7;
  margin-bottom:6px;
}

.owner{
  text-shadow:0 0 25px rgba(255,215,0,0.9);
}

button{
  margin-top:25px;
  padding:15px 40px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.day button{background:#111;color:#fff;}
.night button{background:#fff;color:#000;}

button:active{transform:scale(.96)}

#timer{opacity:.5;margin-top:8px}
</style>
</head>

<body>

<div class="container">
  <h1 id="title">Loading...</h1>
  <p id="status"></p>
  <p id="timer"></p>
  <button id="mainBtn" style="display:none;"></button>
</div>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig={
apiKey:"AIzaSyBn-6yjJd7C4PHF43zj-BEL_bqp4s9S5Yc",
authDomain:"hoodie-lock.firebaseapp.com",
projectId:"hoodie-lock",
storageBucket:"hoodie-lock.firebasestorage.app",
messagingSenderId:"110562874571",
appId:"1:110562874571:web:87fa63e77cac10924c774e"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* ================= CONFIG ================= */

const LOCK_TIMEOUT=120000;

const LENS={
bangaloreDay:"https://www.snapchat.com/unlock/BANGALORE_DAY",
bangaloreNight:"https://www.snapchat.com/unlock/BANGALORE_NIGHT",
globalDay:"https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=18f417f3c8354a2795e115939c19908c&metadata=01",
globalNight:"https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=18f417f3c8354a2795e115939c19908c&metadata=01"
};

const BLR_LAT=12.9716;
const BLR_LON=77.5946;
const ALLOWED_RADIUS_KM=50;

/* ================= HELPERS ================= */

function isDay(){
  const h=new Date().getHours();
  return h>=6&&h<18;
}

function applyTheme(){
  if(isDay()){
    document.body.classList.add("day");
  }else{
    document.body.classList.add("night");
  }
}

function distanceKm(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

/* ================= MAIN ================= */

async function init(){

applyTheme();

const hoodieId=new URLSearchParams(window.location.search).get("hoodie");

if(!hoodieId){
  document.getElementById("title").innerText="Invalid Hoodie";
  return;
}

const ref=db.collection("hoodies").doc(hoodieId);
const snap=await ref.get();
const now=Date.now();

const title=document.getElementById("title");
const status=document.getElementById("status");
const btn=document.getElementById("mainBtn");

btn.style.display="inline-block";

let data=snap.data()||{};

/* RESET LOCK IF EXPIRED */
if(data.inUse && data.usedAt && now-data.usedAt>LOCK_TIMEOUT){
  await ref.update({inUse:false});
  data.inUse=false;
}

/* UNCLAIMED */
if(!data.ownerRegistered){

  title.innerText="Unclaimed Hoodie";
  status.innerText="Activate to personalise your Dragon.";
  btn.innerText="Activate My Hoodie";

  btn.onclick=async()=>{

    btn.disabled=true;
    btn.innerText="Activating...";

    const id=crypto.randomUUID();
    localStorage.setItem("deviceId",id);

    await ref.set({
      ownerRegistered:true,
      registeredDevice:id,
      name:"Owner",
      inUse:false
    },{merge:true});

    title.innerText="Welcome Owner";
    title.classList.add("owner");
    status.innerText="Your hoodie recognises you.";
    btn.innerText="Enter Experience";
    btn.disabled=false;
    btn.onclick=()=>enterExperience(ref);
  };

  return;
}

/* OWNER OR GUEST */

let device=localStorage.getItem("deviceId");

if(device===data.registeredDevice){
  title.innerText="Welcome "+(data.name||"Owner");
  title.classList.add("owner");
}else{
  title.innerText="Hoodie Unlocked";
}

status.innerText="Experience available.";
btn.innerText="Enter Experience";
btn.onclick=()=>enterExperience(ref);
}

/* ================= ENTER EXPERIENCE ================= */

async function enterExperience(ref){

const snap=await ref.get();
const data=snap.data();
const now=Date.now();

/* CHECK LOCK */
if(data.inUse && now-data.usedAt<LOCK_TIMEOUT){
  alert("Hoodie currently in use. Try again shortly.");
  return;
}

/* LOCK NOW */
await ref.update({
  inUse:true,
  usedAt:now
});

/* REQUEST LOCATION (Safari-safe) */
navigator.geolocation.getCurrentPosition(

(pos)=>{
  const dist=distanceKm(
    pos.coords.latitude,
    pos.coords.longitude,
    BLR_LAT,
    BLR_LON
  );

  const isBLR=dist<=ALLOWED_RADIUS_KM;
  const day=isDay();

  let url;

  if(isBLR){
    url=day?LENS.bangaloreDay:LENS.bangaloreNight;
  }else{
    url=day?LENS.globalDay:LENS.globalNight;
  }

  window.location.href=url;
},

()=>{
  const day=isDay();
  const url=day?LENS.globalDay:LENS.globalNight;
  window.location.href=url;
},

{enableHighAccuracy:true}

);
}

init();

</script>
</body>
</html>
