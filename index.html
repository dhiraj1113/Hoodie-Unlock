<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dragon Hoodie Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  text-align:center;
  overflow:hidden;
  transition:background 1s ease,color 1s ease;
}

/* DAY / NIGHT */
.day{
  background:linear-gradient(120deg,#f4f6fb,#e8edf7,#f4f6fb);
  background-size:200% 200%;
  animation:move 8s ease infinite;
  color:#111;
}

.night{
  background:linear-gradient(120deg,#0f1118,#1b1f2c,#0f1118);
  background-size:200% 200%;
  animation:move 10s ease infinite;
  color:#fff;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Subtle watermark */
.watermark{
  position:absolute;
  inset:0;
  background:url("https://images.unsplash.com/photo-1611221786917-1d0db1f2fd56?q=80&w=1600") center/cover no-repeat;
  opacity:0.05;
  filter:blur(2px);
  pointer-events:none;
}

/* Content */
.container{
  position:relative;
  z-index:2;
  padding:25vh 20px;
}

h1{
  font-size:28px;
  margin-bottom:10px;
}

p{
  opacity:.7;
  margin-bottom:6px;
}

.owner{
  text-shadow:0 0 25px rgba(255,215,0,0.9);
}

button{
  margin-top:25px;
  padding:15px 40px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.day button{background:#111;color:#fff;}
.night button{background:#fff;color:#000;}

button:active{transform:scale(.96)}

#timer{opacity:.5;margin-top:8px}
#celestial{position:absolute;top:30px;right:30px;font-size:26px}
</style>
</head>

<body>

<div class="watermark"></div>
<div id="celestial"></div>

<div class="container">
  <h1 id="title">Authenticating...</h1>
  <p id="status"></p>
  <p id="timer"></p>
  <button id="mainBtn" style="display:none;"></button>
</div>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig={
apiKey:"AIzaSyBn-6yjJd7C4PHF43zj-BEL_bqp4s9S5Yc",
authDomain:"hoodie-lock.firebaseapp.com",
projectId:"hoodie-lock",
storageBucket:"hoodie-lock.firebasestorage.app",
messagingSenderId:"110562874571",
appId:"1:110562874571:web:87fa63e77cac10924c774e"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const LOCK_TIMEOUT=120000;

/* ================= LENS LINKS ================= */

const LENS={
bangaloreDay:"https://www.snapchat.com/unlock/BANGALORE_DAY",
bangaloreNight:"https://www.snapchat.com/unlock/BANGALORE_NIGHT",
globalDay:"https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=18f417f3c8354a2795e115939c19908c&metadata=01",
globalNight:"https://www.snapchat.com/unlock/?type=SNAPCODE&uuid=18f417f3c8354a2795e115939c19908c&metadata=01"
};

const BLR_LAT=12.9716;
const BLR_LON=77.5946;
const ALLOWED_RADIUS_KM=50;

/* ================= THEME ================= */

function isDay(){
const h=new Date().getHours();
return h>=6&&h<18;
}

function applyTheme(){
const celestial=document.getElementById("celestial");
if(isDay()){
document.body.classList.add("day");
celestial.innerText="☀️";
}else{
document.body.classList.add("night");
celestial.innerText="🌙";
}
}

/* ================= GEO DISTANCE ================= */

function distanceKm(a,b,c,d){
const R=6371;
const dLat=(c-a)*Math.PI/180;
const dLon=(d-b)*Math.PI/180;
const x=Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

/* ================= MAIN ================= */

async function init(){

applyTheme();

const hoodieId=new URLSearchParams(window.location.search).get("hoodie");
if(!hoodieId){
document.getElementById("title").innerText="Invalid Hoodie";
return;
}

const ref=db.collection("hoodies").doc(hoodieId);
let snap=await ref.get();
let now=Date.now();

/* RESET LOCK IF EXPIRED */
if(snap.exists){
const d=snap.data();
if(d.inUse && d.usedAt && now-d.usedAt>LOCK_TIMEOUT){
await ref.update({inUse:false});
}
}

snap=await ref.get();
const data=snap.data()||{};

await ref.set({inUse:true,usedAt:now},{merge:true});
startTimer();

navigator.geolocation.getCurrentPosition(pos=>{
const dist=distanceKm(pos.coords.latitude,pos.coords.longitude,BLR_LAT,BLR_LON);
startUI(ref,data,dist<=ALLOWED_RADIUS_KM);
},()=>startUI(ref,data,false),{enableHighAccuracy:true});
}

/* ================= UI STATE ================= */

function startUI(ref,data,isBLR){

const title=document.getElementById("title");
const status=document.getElementById("status");
const btn=document.getElementById("mainBtn");

btn.style.display="inline-block";

let device=localStorage.getItem("deviceId");

/* UNCLAIMED */
if(!data.ownerRegistered){

title.innerText="Unclaimed Hoodie";
status.innerText="Activate to personalise your Dragon.";
btn.innerText="Activate My Hoodie";

btn.onclick=async()=>{
btn.disabled=true;
const id=crypto.randomUUID();
localStorage.setItem("deviceId",id);

await ref.update({
ownerRegistered:true,
registeredDevice:id,
name:"Owner"
});

title.innerText="Welcome Owner";
title.classList.add("owner");
status.innerText="Your hoodie recognises you.";
btn.innerText="Enter Experience";
btn.disabled=false;
btn.onclick=()=>openLens(isBLR);
};

return;
}

/* OWNER */
if(device===data.registeredDevice){

title.innerText="Welcome "+(data.name||"Owner");
title.classList.add("owner");
status.innerText="Your Dragon Hoodie recognises you.";
btn.innerText="Enter Experience";
btn.onclick=()=>openLens(isBLR);
return;
}

/* GUEST */

title.innerText="Hoodie Unlocked";
status.innerText="Experience available.";
btn.innerText="Enter Experience";
btn.onclick=()=>openLens(isBLR);
}

/* ================= LENS ================= */

function openLens(isBLR){
const day=isDay();
let url;
if(isBLR){
url=day?LENS.bangaloreDay:LENS.bangaloreNight;
}else{
url=day?LENS.globalDay:LENS.globalNight;
}
window.location.href=url;
}

/* ================= TIMER ================= */

function startTimer(){
let t=120;
const timer=document.getElementById("timer");
setInterval(()=>{
if(t>=0){
timer.innerText="Session ends in "+t--+"s";
}
},1000);
}

/* ================= RELEASE LOCK ================= */

window.addEventListener("beforeunload",async()=>{
const hoodieId=new URLSearchParams(window.location.search).get("hoodie");
if(!hoodieId)return;
await db.collection("hoodies").doc(hoodieId).set({inUse:false},{merge:true});
});

init();

</script>
</body>
</html>
